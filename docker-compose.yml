version: "3.9"

# ─── CLINICORE Backend Infrastructure ────────────────────────────────────────
# Run: docker compose up -d
# All services use named volumes for data persistence across restarts.

services:

  # ── PostgreSQL (main relational database) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinicore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinicore_db
      POSTGRES_USER: clinicore
      POSTGRES_PASSWORD: password         # change in production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicore -d clinicore_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (session cache, Celery broker, zero-retention store) ─────────────
  redis:
    image: redis:7-alpine
    container_name: clinicore_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector database for RAG / research retrieval) ──────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: clinicore_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"    # HTTP API
      - "6334:6334"    # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── MinIO (S3-compatible private image/file storage) ───────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: clinicore_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicore_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicore:password@postgres:5432/clinicore_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      QDRANT_HOST: qdrant
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./app:/app/app    # hot reload in development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (background knowledge update tasks) ──────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicore_celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicore:password@postgres:5432/clinicore_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      QDRANT_HOST: qdrant
    depends_on:
      - redis
      - postgres
      - qdrant

  # ── Celery Beat (task scheduler — triggers nightly PubMed ingestion) ────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicore_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis

  # ── Flower (Celery monitoring dashboard) ───────────────────────────────────
  flower:
    image: mher/flower:2.0.1
    container_name: clinicore_flower
    restart: unless-stopped
    command: celery --broker=redis://redis:6379/1 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
